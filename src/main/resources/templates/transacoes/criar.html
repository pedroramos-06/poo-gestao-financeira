<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|WalletFlow - ${transacao.id != null ? 'Editar Transação' : 'Registrar Transação'}|"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand px-5 bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">WalletFlow</a>
            <ul class="navbar-nav gap-4">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/metas">Metas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/transacoes">Transações</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-outline-danger">Sair</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>
    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1" th:text="${transacao.id} ? 'Editar Transação' : 'Registrar Transação'"></h2>
                <p class="text-muted mb-0" th:text="${transacao.id} ? 'Altere os campos que deseja mudar na transação' : 'Preencha os dados abaixo para registrar uma nova transação'"></p>
            </div>

            <a href="/transacoes" class="btn btn-outline-dark ms-auto">🠔 Voltar para transações</a>
        </div>

        <div class="card">
            <form class="card-body row g-4 p-4" th:action="@{/transacoes}" method="post" th:object="${transacao}">
                <input th:if="${transacao.id}" type="hidden" name="_method" value="put"> <!-- Muda o method do form caso esteja editando uma transação -->
                <input type="hidden" th:field="*{id}">

                <div class="mb-3" th:if="${#fields.hasErrors('*')}">
                    <ul>
                        <li th:each="erro : ${#fields.errors('*')}"
                            th:text="${erro}"
                            style="color: red"></li>
                    </ul>
                </div>

                <h4>Dados da Transação</h4>

                <div class="col-6">
                    <label class="form-label" for="data">Data</label>
                    <input class="form-control" id="data" type="date" th:field="*{data}">
                </div>
                <div class="col-6">
                    <label class="form-label">Tipo de transação</label>
                    <div class="d-flex btn-group">
                        <input class="btn-check" id="entrada" type="radio" th:field="*{tipo}" th:value="ENTRADA" autocomplete="off">
                        <label class="btn btn-outline-success w-100" for="entrada">Entrada</label>

                        <input class="btn-check" id="saida" type="radio" th:field="*{tipo}" th:value="SAIDA" autocomplete="off">
                        <label class="btn btn-outline-danger w-100" for="saida">Saída</label>
                    </div>
                </div>

                <div class="col-6">
                    <label class="form-label" for="categoria">Categoria</label>
                    <select class="form-select" id="categoria" name="categoria">
                        <option value="" disabled hidden th:selected="*{categoria == null}">Escolha uma categoria</option>
                        <option th:each="cat : ${T(WalletFlow.sistemagestaofinanceira.enums.Categoria).values()}"
                                th:value="${cat}"
                                th:text="${cat.descricao}"
                                th:selected="*{categoria} == ${cat}">
                        </option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label" for="valor">Valor</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input class="form-control" id="valor" type="number" step="0.01" th:field="*{valor}">
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label" for="descricao">Descrição</label>
                    <textarea class="form-control" id="descricao" placeholder="Digite aqui a descrição da transação" th:field="*{descricao}"></textarea>
                </div>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-success" th:text="${transacao.id} ? 'Editar Transação' : 'Salvar Transação'"></button>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
