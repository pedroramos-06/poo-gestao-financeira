<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-danger">Sair</button>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="transacao : ${transacoes}">
                <td th:text="${transacao.data}"></td>
                <td th:text="${transacao.descricao}"></td>
                <td th:text="${transacao.categoria}"></td>
                <td th:text="${transacao.tipo}"></td>
                <td th:text="${transacao.valor}"></td>
                <td>
                    <a th:href="@{/transacoes/{id}/excluir(id=${transacao.id})}" class="btn btn-danger">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/transacoes/criar" class="btn btn-primary">Nova Transação</a>
</div>
</body>
</html>
