<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Criar Conta - WalletFlow</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container d-flex justify-content-center align-items-center vh-100">
            <div class="card shadow-sm p-4" style="width: 400px;">
                <h3 class="text-center mb-4">Criar Conta</h3>

                <form th:action="@{/user/register}" method="post" th:object="${usuario}" id="form">
                    <!-- Lista geral de erros -->
                    <div class="mb-3" th:if="${#fields.hasErrors('*')}">
                        <ul>
                            <li th:each="erro : ${#fields.errors('*')}"
                                th:text="${erro}"
                                style="color: red"></li>
                        </ul>
                    </div>
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite seu nome" th:field="*{nome}">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu e-mail" th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite sua senha" th:field="*{senha}">
                    </div>
                    <div class="mb-3">
                        <label for="confirmaSenha" class="form-label">Confirme a senha</label>
                        <input type="password" class="form-control" id="confirmaSenha" name="senha" placeholder="Confirme sua senha">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Cadastrar</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="/user/login">Já tem conta? Faça login</a>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const senha = document.getElementById("senha");
        const confirmaSenha = document.getElementById("confirmaSenha");

        function validarEmail() {
            if (senha.value !== confirmaSenha.value) {
                confirmaSenha.setCustomValidity("As senhas informadas não correspondem.");
            } else {
                confirmaSenha.setCustomValidity("");
            }
        }

        confirmaSenha.addEventListener("input", validarEmail);

        document.getElementById("form").addEventListener("submit", function(event) {
            if (!this.checkValidity()) {
                event.preventDefault();
                alert("Por favor, verifique a senha informada.");
            }
        });
    </script>
    </body>
</html>
