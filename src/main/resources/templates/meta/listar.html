<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletFlow - Metas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light"> <nav class="navbar navbar-expand bg-dark border-bottom mb-4" data-bs-theme="dark" style="padding-inline: 50px;">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <strong>WalletFlow</strong>
        </a>
        <ul class="navbar-nav d-flex flex-row ms-auto gap-4">
            <li class="nav-item">
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/metas">Metas</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/transacoes">Transações</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Metas de Gastos</h2>
            <p class="text-muted mb-0">Defina e gerencie seus limites de despesas para cada mês</p>
        </div>
        <div>
            <a href="/metas/criar" class="btn btn-success d-flex align-items-center gap-2">
                <span>+</span> Nova Meta
            </a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0"> <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" style="width: 40%;">Mês / Período</th>
                    <th style="width: 35%;">Limite Estipulado</th>
                    <th class="pe-4 text-end" style="width: 25%;">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="meta : ${metas}">
                    <td class="ps-4 fw-semibold text-secondary" th:text="${meta.data}">Junho de 2026</td>
                    <td class="text-dark fw-bold" th:text="${meta.valor}">R$ 4.000,00</td>
                    <td class="pe-4 text-end">
                        <div class="btn-group btn-group-sm" role="group">
                            <a th:href="@{/metas/{id}/editar(id=${meta.id})}" class="btn btn-outline-secondary">Editar</a>
                            <a th:href="@{/metas/{id}/excluir(id=${meta.id})}" class="btn btn-outline-danger">Excluir</a>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(metas)}">
                    <td colspan="3" class="text-center py-4 text-muted">
                        Nenhuma meta cadastrada para este período.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
